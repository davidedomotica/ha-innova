name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches integration version
        shell: bash
        run: |
          set -euo pipefail
          version="$(python -c 'import json; print(json.load(open("custom_components/innova/manifest.json"))["version"])')"
          test "${GITHUB_REF_NAME}" = "v${version}"
      - name: Build HACS archive
        shell: bash
        run: |
          mkdir -p dist
          cd custom_components/innova
          zip -r ../../dist/innova.zip . -x '__pycache__/*' '*.pyc'
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release create "$GITHUB_REF_NAME" dist/innova.zip --generate-notes --title "$GITHUB_REF_NAME"
